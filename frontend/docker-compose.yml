version: '3.8'

services:
  # MySQL Ma'lumotlar Bazasi (Railway ga to'g'irlangan shaklda xuddi shunday ishlaydi)
  mysql:
    image: mysql:8.0
    container_name: navbat_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-DFtwhSwoCTRZomZOemvvaQOBzJZlikLz}
      MYSQL_DATABASE: ${DB_DATABASE:-railway}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: navbat_backend
    restart: always
    environment:
      - PORT=${PORT:-5000}
      - JWT_SECRET=${JWT_SECRET:-navbat_uz_maxfiy_kalit_2026}
      - CLIENT_URL=${CLIENT_URL:-https://loyiha-nav-production.up.railway.app}
      - NODE_ENV=${NODE_ENV:-production}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_DATABASE=${DB_DATABASE:-railway}
      - DB_HOST=${DB_HOST:-mysql} # Lokal ishlatsa mysql konteyneriga ulanadi, Railwayda o'zinikiga
      - DB_PASSWORD=${DB_PASSWORD:-DFtwhSwoCTRZomZOemvvaQOBzJZlikLz}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-root}
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Brauzer backendga to'g'ridan-to'g'ri ulanadi
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    container_name: navbat_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
