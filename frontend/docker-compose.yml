version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: navbat_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: navbat_backend
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/queue_system
      - JWT_SECRET=navbat_super_docker_secret_2026
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Brauzer backendga to'g'ridan-to'g'ri ulanadi (nginx proksi yo'q)
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    container_name: navbat_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
